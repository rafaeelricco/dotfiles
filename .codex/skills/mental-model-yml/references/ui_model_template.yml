# =============================================================================
# UI & FEATURE MENTAL MODEL TEMPLATE
# =============================================================================
# This template is used to describe with technical and business precision
# how a feature or screen should behave.
# =============================================================================

id: "MM-UI-XX" # Unique identifier following the pattern MM-UI-Number
title: "Screen or Feature Name"
status: "draft" # draft | in-review | approved

dependencies:
  depends_on:
    - "MM1" # Usually depends on a business model (e.g., Business Environment)
    - "MM-UI-AUTH" # Or a preceding screen (e.g., Login)
  feeds_into:
    - "MM-UI-YY" # Next step in the flow

context: |
  THE WHY: Explain the problem this screen solves and the primary User Story.
  Example: "As a Hart Ops Manager, I need to create events in bulk to reduce
  time spent on repetitive administrative tasks."

scope:
  in_scope:
    - "Specific visual elements (e.g., 'CSV Upload' button)"
    - "User actions (e.g., 'Map file columns')"
    - "Screen states (e.g., 'Processing', 'Validation Error')"
  out_of_scope:
    - "Payroll tax calculation (this belongs in the Payroll MM)"
    - "Educator Mobile access (this belongs in MM-UI-Mobile)"

key_concepts:
  - term: "Technical/UI Concept"
    definition: "Explanation of what the term means in this context."
    sources:
      - doc: "source_filename.txt"
        details: "Page or video timestamp (Note: Optional for manual entries)" # Optional for manual entries
  - term: "Predictive Mapping"
    definition: "The UI's ability to suggest columns based on upload history."

core_content:
  - section_title: "Interaction Flow"
    points:
      - "Entry Point: User clicks 'Create Event' on the Dashboard."
      - "Step 1: Client and campaign selection (single dropdown)."
      - "Critical Path: If the client has no active campaign, show a link to create a new one."
    sources:
      - doc: "meeting_transcript.txt"
        details: "~12:40"

  - section_title: "Layout & Visual Logic"
    points:
      - "Visual Priority: The 'Next' button only enables after required fields are valid."
      - "Real-time Feedback: Show a progress counter during file processing."
    sources:
      - doc: "design_notes.md"

  - section_title: "Business Rules in UI"
    points:
      - "Validation: Do not allow past dates for new events."
      - "Permissions: Only users with 'Hart Ops' profile can see this button."

assumptions:
  - "The user has a stable connection (or the system must have offline-sync)."
  - "Campaign data has been previously loaded for the client."

implications:
  - "Frontend: Need to implement debouncing on the search field to avoid overcalling the API."
  - "Backend: The API must return field-specific validation errors for immediate feedback."
